[server_local]
# 本地服务器节点
## --------------------------
[server_remote]
# 服务器引用(订阅)，支持远程订阅地址和本地文件
## --------------------------
[rewrite_remote]
# 远程重写订阅:包含主机名 hostname 以及复写 rewrite 规则
# update-interval 为更新时间参数，单位：秒, 默认更新时间为：24*60*60=86400 秒，也就是24小时
# opt-parser=true/false 用于控制是否对订阅开启资源解析器，不写或者 false 表示不启用解析器
https://whatshub.top/rewrite/SpotifyPremium.conf, tag=Spotify解锁, update-interval=86400, opt-parser=true, enabled=true
https://github.com/ddgksf2013/Rewrite/raw/master/AdBlock/YoutubeAds.conf, tag=YouTube广告, update-interval=86400, opt-parser=true, enabled=true
